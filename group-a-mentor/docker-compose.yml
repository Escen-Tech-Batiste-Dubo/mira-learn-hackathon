# ═══════════════════════════════════════════════════════════════════
# Groupe A — Postgres local pour le backend FastAPI
#
# Lancer :   docker compose up -d
# Arrêter :  docker compose down
# Reset DB : docker compose down -v   (supprime le volume)
# ═══════════════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine
    container_name: pg-hackathon-group-a
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
    name: pg-hackathon-group-a
