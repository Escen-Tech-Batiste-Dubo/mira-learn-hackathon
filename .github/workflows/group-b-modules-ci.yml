name: Group B Modules CI

on:
  push:
    branches:
      - feat/module-edition
    paths:
      - group-b-class/**
  pull_request:
    branches:
      - main
    paths:
      - group-b-class/**

permissions:
  contents: read

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: group-b-class/backend
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy
      - run: ruff check app/
      - run: mypy app/ --strict --ignore-missing-imports

  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: group-b-class/backend
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest app/tests/test_module_service.py -v --tb=short

  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: group-b-class/web
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx tsc --noEmit

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: group-b-class/web
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint
