[mypy]
# Align CI + Makefile: install requirements before mypy (Pydantic plugin needs real imports).
# Full --strict is phased: enable incrementally in mypy.ini / per-module once coverage grows.
python_version = 3.11
plugins = pydantic.mypy
ignore_missing_imports = True
warn_unused_ignores = True
# Unit tests under app/ use dynamic mocks; type them separately if needed.
exclude = ^app/tests/
